# /etc/nginx/sites-available/padlok-api
#
# Reverse-proxies https://api.padlokit.com  →  http://127.0.0.1:4000
# Certbot will rewrite this file in-place to add the SSL cert + redirect
# from port 80 → 443. Until certbot runs, only the port-80 server block
# is active so DNS validation can succeed.
#
# Symlink:  sudo ln -s /etc/nginx/sites-available/padlok-api /etc/nginx/sites-enabled/
# Reload:   sudo nginx -t && sudo systemctl reload nginx

# Limit request body to 5 MB — admin endpoints don't accept large uploads.
client_max_body_size 5m;

server {
    listen 80;
    listen [::]:80;
    server_name api.padlokit.com;

    # Let certbot --nginx own the 443 block. This 80 block is what it edits to add
    # the redirect once SSL is provisioned.
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        '';
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Health endpoint should be reachable on plain HTTP so AWS health checks
    # (and us during cert provisioning) don't need TLS.
    location = /health {
        proxy_pass http://127.0.0.1:4000/health;
        access_log off;
    }
}
